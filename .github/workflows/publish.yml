name: Publish to crates.io

# Publishes all workspace crates to crates.io from a tagged release commit.
#
# Deliberately decoupled from the tag-triggered release workflow: publishing
# is a separate, manually dispatched act so that pushing a tag can never
# publish by itself. The job authenticates via crates.io Trusted Publishing
# (GitHub OIDC, no long-lived registry token) and runs under the `crates-io`
# environment, whose protection rules require a manual approval before the
# job starts.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.1.0-alpha.5); must match the workspace version"
        required: true
        type: string

concurrency:
  group: publish-crates
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: publish (${{ inputs.tag }})
    runs-on: ubuntu-latest
    environment: crates-io
    # 35 sequential verify builds plus registry rate-limit waits.
    timeout-minutes: 300
    permissions:
      contents: read
      # Required for the crates.io Trusted Publishing OIDC token exchange.
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
      # The dispatched tag must name the version the workspace actually
      # carries; publishing HEAD-of-branch or a mistyped tag fails here,
      # before any upload.
      - name: Verify tag matches the workspace version
        run: |
          workspace_version=$(cargo metadata --no-deps --format-version 1 |
            python3 -c "import json,sys; print(json.load(sys.stdin)['packages'][0]['version'])")
          tag="${{ inputs.tag }}"
          if [ "v${workspace_version}" != "${tag}" ]; then
            echo "workspace version v${workspace_version} does not match dispatched tag ${tag}" >&2
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      # stellar-ledger pulls hidapi, which links libudev on Linux for HID device
      # enumeration. The runner ships pkg-config but not the libudev headers.
      - name: Install libudev (Linux hidapi)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth
      - name: Publish all crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: bash .github/scripts/publish-crates.sh
