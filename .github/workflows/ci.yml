name: CI

# Offline gate suite for the workspace. Every push and pull request to main runs
# format, lint, the offline test tier, unused-dependency detection, and the
# license/advisory check. The live testnet-acceptance tests are intentionally
# out of scope here: they hit real RPC and Friendbot and run from a separate,
# deliberately paced workflow.

on:
  push:
    branches: [main]
    # A commit that touches only documentation cannot affect any gate below.
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

# Supersede in-flight runs for the same ref so rapid pushes do not queue stale
# work.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# These jobs only read the checked-out source; deny the token every other scope.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          components: clippy
      # stellar-ledger pulls hidapi, which links libudev on Linux for HID device
      # enumeration. The runner ships pkg-config but not the libudev headers.
      - name: Install libudev (Linux hidapi)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # --all-features compile-checks the entire graph, including the code behind
      # the testnet-acceptance features, without executing any test. The
      # workspace lints declared in the root Cargo.toml deny warnings; -D
      # warnings turns any remaining warning into a failure.
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (offline)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Dropping test-profile debuginfo roughly halves target/ size and link time,
    # keeping the build closure within the runner's free disk.
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # The smart-account dependency closure (Arkworks, wasmi, soroban-env-host)
      # plus every compiled test binary is large; reclaim space the build does
      # not need.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force >/dev/null 2>&1 || true
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      - name: Install libudev (Linux hidapi)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # Offline tier only. The enabled features expose the test-only helpers and
      # fixtures the integration suites depend on; none of them pulls the live
      # testnet client helpers. The testnet-acceptance / testnet-integration
      # features stay off and the heavy submit flows are #[ignore]d, so no test
      # reaches the network. --all-features is deliberately avoided here: it
      # would enable the live tiers and attempt real RPC and Friendbot access.
      - run: cargo test --workspace --features test-helpers,test-hooks,test-loopback,verifier-registry
      # stellar-agent-cli does not declare test-hooks/test-loopback/verifier-registry,
      # so cargo silently drops it from the --workspace --features run above
      # without erroring; run it explicitly so this job actually covers it.
      - run: cargo test -p stellar-agent-cli --features test-helpers

  windows-storage:
    name: windows-storage
    runs-on: windows-latest
    timeout-minutes: 90
    # Targeted regression coverage for Windows-only local-storage bugs that
    # ubuntu-latest cannot catch:
    #
    # 1. Audit-log single-handle fix: `AuditWriter` uses one handle for BOTH
    #    the exclusive lock and every read/write against the active log file
    #    — a separate lock-holder handle plus a separate I/O handle is
    #    unsound on Windows. POSIX advisory locks never block a second
    #    handle's I/O; `LockFileEx`'s exclusive lock is enforced against I/O
    #    issued through any OTHER handle to the same file, including a second
    #    handle opened by the SAME process.
    # 2. Parent-directory-fsync fix: `PendingApprovalStore`/`ToolsetGrantStore`
    #    open the parent directory as a file to fsync it after an atomic
    #    rename (a POSIX durability idiom) — `std::fs::File::open` on a
    #    directory path requires `FILE_FLAG_BACKUP_SEMANTICS` on Windows,
    #    which the stable API does not set, and fails with
    #    `ERROR_ACCESS_DENIED`. Both stores now skip this step on non-Unix.
    #
    # Bounded to the touched crates' unit tests (not the full workspace
    # matrix) to keep this job cheap.
    #
    # TEMPORARY SCOPE: the audit-log READER opens its own handle on the
    # active log; while a writer holds the exclusive lock, Windows blocks
    # reads through any other handle, so the reader test module fails
    # wholesale on windows-latest until the lock design allows concurrent
    # readers. Until that campaign lands, this job runs only the suites
    # that are proven or lock-free on Windows; the reader module, the MCP
    # rule tools, and the full audit_log module rejoin afterwards.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: windows-storage
          # Failing iterations must still seed the build cache, or every
          # retry recompiles the dependency tree cold on a slow runner.
          cache-on-failure: true
      # Compilation is unbounded below the job ceiling (a compile progresses
      # or errors; only cold-cache runs need the headroom). Test EXECUTION is
      # where a Windows lock deadlock can hang, so every test step runs under
      # a 10-minute GNU timeout (Git Bash) — a hang costs minutes, not the
      # rest of the job budget.
      - name: Build test binaries (unbounded compile phase)
        shell: bash
        run: cargo test -p stellar-agent-core --lib --no-run
      - name: Audit-log writer single-handle regression (stellar-agent-core)
        # The two skipped rotation tests fail on Windows for campaign-tracked
        # reasons (see the TEMPORARY SCOPE note above); they rejoin with the
        # reader module.
        shell: bash
        run: "timeout 600 cargo test -p stellar-agent-core --lib audit_log::writer:: -- --skip hmac_sidecar_renamed_on_rotation --skip post_rotation_active_path_is_locked --skip rotation_lock_failure_returns_partial_rotation_and_poisons_writer"
      - name: Approval + toolset-grant store persist regression (stellar-agent-core)
        shell: bash
        run: "timeout 600 cargo test -p stellar-agent-core --lib -- approval::store::tests::persist approval::toolset_grant::tests::persist"

  machete:
    name: unused-deps
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # cargo machete shells out to cargo metadata, so declare the toolchain
      # explicitly rather than relying on the runner image default.
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      - uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
        with:
          tool: cargo-machete@0.9.2
      - run: cargo machete

  deny:
    name: licenses-advisories
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # cargo deny check resolves the dependency graph via cargo metadata, so
      # declare the toolchain explicitly rather than relying on the runner image
      # default.
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      - uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
        with:
          tool: cargo-deny@0.19.9
      # The advisories check fetches the RustSec advisory database over the
      # network at run time, so its result can change between runs of the same
      # commit when an upstream advisory is published. The license, ban, and
      # source checks are deterministic from the committed Cargo.lock and
      # deny.toml.
      - run: cargo deny check

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # The instrumented build plus every compiled test binary is large; reclaim
      # space the build does not need.
      - name: Free disk space
        # The instrumented workspace build plus the vendored OpenSSL source
        # build need more headroom than the plain test job.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/lib/node_modules
          sudo docker image prune --all --force >/dev/null 2>&1 || true
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          components: llvm-tools-preview
      - name: Install libudev (Linux hidapi)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Coverage builds are instrumented and differ from the other jobs; keep
          # them in a separate cache so they do not evict the plain-build caches.
          prefix-key: coverage
      - uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
        with:
          tool: cargo-llvm-cov@0.8.7
      # Offline tier only, matching the `test` job's feature set. --all-features
      # is deliberately avoided so no live RPC / Friendbot test runs; coverage of
      # the remaining live-network lines is out of scope for this offline gate.
      - name: Measure offline line coverage
        run: cargo llvm-cov --workspace --features test-helpers,test-hooks,test-loopback,verifier-registry --json --output-path cov.json
      - name: Enforce per-crate line-coverage floors
        run: python3 .github/scripts/check-coverage.py cov.json
