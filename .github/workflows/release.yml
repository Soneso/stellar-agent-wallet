name: Release

# Builds, signs, and publishes a tagged release: preflight checks, a
# five-target build matrix producing one archive per target (both binaries in
# each archive), a combined SHA256SUMS, cosign keyless signatures, SLSA
# provenance, and a GitHub Release. The per-push CI workflow already gates
# fmt, clippy, tests, and licenses/advisories on every commit that reaches
# main, so this workflow re-runs only the checks a release specifically
# needs: that the tag matches the tagged tree, and cargo-deny (dependency
# graph can shift between the last CI run on main and the tag).

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Extract version from tag
        id: version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Verify tag matches workspace version
        run: .github/scripts/release-preflight-version-check.sh "${{ steps.version.outputs.version }}"

      - name: Verify workspace.package.repository invariance
        # The repository field drives the `{ repo }` template variable in
        # [package.metadata.binstall] on both binary crates. A mismatch would
        # redirect `cargo binstall` to fetch from the wrong GitHub repository.
        run: |
          set -euo pipefail
          EXPECTED="${{ github.server_url }}/${{ github.repository }}"
          ACTUAL=$(cargo metadata --format-version 1 --no-deps --offline --frozen \
            | jq -er '.packages[] | select(.source == null) | (.repository // "<MISSING>")' \
            | sort -u)
          COUNT=$(printf '%s\n' "$ACTUAL" | wc -l | tr -d ' ')
          if [ "$COUNT" -ne 1 ]; then
            echo "Workspace members disagree on repository URL:"
            while IFS= read -r line; do
              echo "  - $line"
            done <<< "$ACTUAL"
            exit 1
          fi
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "[workspace.package].repository mismatch."
            echo "  expected: $EXPECTED"
            echo "  actual:   $ACTUAL"
            exit 1
          fi

      - name: Verify CHANGELOG version header exists
        run: |
          set -euo pipefail
          if ! grep -q "^## \[$TAG_VERSION\]" CHANGELOG.md; then
            echo "CHANGELOG.md missing version header for v$TAG_VERSION"
            exit 1
          fi
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}

      - name: Check cargo-deny
        # Dependency-graph gate specific to a release cut: cargo-deny runs on
        # every push to main too, but the dependency graph (and the RustSec
        # advisory database) can shift between the last CI run and the tag.
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-deny@0.19.9
      - run: cargo deny check

      - name: Verify working tree matches tag
        run: |
          set -euo pipefail
          if ! git diff --quiet HEAD; then
            echo "Working tree has uncommitted changes against HEAD"
            exit 1
          fi
          UNTRACKED=$(git status --porcelain | grep -E '^\?\?' || true)
          if [ -n "$UNTRACKED" ]; then
            echo "Working tree has untracked files (release must build from a clean tagged commit):"
            echo "$UNTRACKED"
            exit 1
          fi

  build:
    name: build ${{ matrix.target }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      # stellar-agent-network depends on stellar-ledger, which pulls hidapi;
      # hidapi links libudev on Linux for HID device enumeration. Only the
      # native x86_64 build compiles directly on this runner and needs the
      # host's libudev headers — the aarch64 leg below builds inside the
      # cross Docker image, which carries its own cross-compiled libudev.
      - name: Install libudev (Linux hidapi)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install cross (for aarch64-unknown-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --version 0.2.5 --locked

      # stellar-baselib links libsodium; on MSVC its build script fetches the
      # prebuilt archive from download.libsodium.org over plain HTTP with no
      # retry, which is flaky from Windows runners. Pre-fetching the same
      # archive over HTTPS with retries into SODIUM_DIST_DIR makes the build
      # script consume the local copy instead; it still verifies the
      # archive's minisign signature against its pinned upstream key, so
      # integrity does not rest on this download step.
      - name: Prefetch libsodium dist (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          set -euo pipefail
          DIST_DIR="$RUNNER_TEMP/sodium-dist"
          mkdir -p "$DIST_DIR"
          BASE="https://download.libsodium.org/libsodium/releases"
          for f in libsodium-1.0.22-stable-msvc.zip libsodium-1.0.22-stable-msvc.zip.minisig; do
            curl --fail --silent --show-error --location --retry 5 --retry-all-errors \
              --output "$DIST_DIR/$f" "$BASE/$f"
          done
          echo "SODIUM_DIST_DIR=$DIST_DIR" >> "$GITHUB_ENV"

      - name: Build binaries
        # CROSS_IMAGE pins the cross Docker image by digest (an index
        # manifest covering both amd64 and arm64 host variants; Docker
        # resolves to the runner's own architecture at pull time). GHCR tags
        # are mutable, so pinning by tag alone would let a push to the
        # cross-rs registry silently change the image this build compiles
        # inside. Digest confirmed current against the ghcr.io/cross-rs
        # 0.2.5 tag at the time this workflow was authored; re-resolve with
        # `docker buildx imagetools inspect` when the cross version pin above
        # changes.
        env:
          CROSS_IMAGE: ghcr.io/cross-rs/aarch64-unknown-linux-gnu@sha256:7f8308a8734d9fcd2ebbe9a3e4bdea74af293f0799d80c3cc341e340cda49a4c
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }} --bin stellar-agent --bin stellar-agent-mcp
          else
            cargo build --release --target ${{ matrix.target }} --bin stellar-agent --bin stellar-agent-mcp
          fi

      - name: Prepare archive
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DIR="target/${TARGET}/release"
          STAGING_DIR="stellar-agent-${VERSION}-${TARGET}"
          mkdir -p "$STAGING_DIR"

          cp README.md "$STAGING_DIR/"
          cp LICENSE "$STAGING_DIR/"

          if [ "$TARGET" = "x86_64-pc-windows-msvc" ]; then
            cp "$RELEASE_DIR/stellar-agent.exe" "$STAGING_DIR/"
            cp "$RELEASE_DIR/stellar-agent-mcp.exe" "$STAGING_DIR/"
            ARCHIVE_NAME="${STAGING_DIR}.zip"
            7z a -tzip "$ARCHIVE_NAME" "$STAGING_DIR" >/dev/null
          else
            cp "$RELEASE_DIR/stellar-agent" "$STAGING_DIR/"
            cp "$RELEASE_DIR/stellar-agent-mcp" "$STAGING_DIR/"
            ARCHIVE_NAME="${STAGING_DIR}.tar.xz"
            tar --create --xz --file "$ARCHIVE_NAME" "$STAGING_DIR"
          fi

          echo "archive=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TARGET: ${{ matrix.target }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts-${{ matrix.target }}
          path: ${{ steps.prepare.outputs.archive }}
          retention-days: 7
          if-no-files-found: error

  hashes:
    name: hashes
    needs: [preflight, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      subjects: ${{ steps.subjects.outputs.subjects }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: all-artifacts

      - name: Compute SHA256SUMS and base64 subjects
        id: subjects
        run: |
          set -euo pipefail
          mkdir -p release-combined
          : > release-combined/SHA256SUMS
          while IFS= read -r -d '' f; do
            ( cd "$(dirname "$f")" && sha256sum -- "$(basename "$f")" ) \
              >> release-combined/SHA256SUMS
          done < <(find all-artifacts \( -name '*.tar.xz' -o -name '*.zip' \) -print0 | LC_ALL=C sort -z)

          lines=$(wc -l < release-combined/SHA256SUMS)
          if [ "$lines" -eq 0 ]; then
            echo "ERROR: no archives found under all-artifacts/"
            exit 1
          fi

          # SLSA generic generator subject format: base64-encoded
          # `sha256sum`-style output, one subject per line.
          SUBJECTS=$(base64 -w0 < release-combined/SHA256SUMS)
          echo "subjects=${SUBJECTS}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-hashes
          path: release-combined/SHA256SUMS
          retention-days: 7

  sign:
    name: sign
    needs: [preflight, build, hashes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: artifacts

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-hashes
          path: release-combined

      - name: Sign archives and SHA256SUMS with cosign
        # `--bundle` writes signature, signing certificate, and the Rekor
        # transparency-log entry into one Sigstore bundle file. Verification
        # (see README "Verifying a release") needs only the bundle plus the
        # certificate identity and OIDC issuer — no separate certificate file.
        run: |
          set -euo pipefail
          for file in artifacts/artifacts-*/*.tar.xz artifacts/artifacts-*/*.zip release-combined/SHA256SUMS; do
            [ -f "$file" ] || continue
            echo "Signing $(basename "$file")"
            cosign sign-blob --yes --bundle "$file.sigstore.json" "$file"
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signatures
          path: |
            artifacts/**/*.sigstore.json
            release-combined/*.sigstore.json
          retention-days: 7

  provenance:
    name: provenance
    needs: [preflight, hashes]
    permissions:
      actions: read
      id-token: write
      contents: write
    # The SLSA generator MUST be referenced by a released semantic-version
    # tag (@vX.Y.Z), never a commit SHA: slsa-verifier resolves the trusted
    # builder identity from the ref recorded in the provenance, and a hash
    # pin fails that resolution. This is the one action reference in this
    # workflow that is intentionally not SHA-pinned.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.hashes.outputs.subjects }}
      upload-assets: false
      provenance-name: stellar-agent-${{ needs.preflight.outputs.version }}.intoto.jsonl

  publish:
    name: publish
    needs: [preflight, build, sign, hashes, provenance]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: all-artifacts

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signatures
          path: all-signatures

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-hashes
          path: release-combined

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: stellar-agent-${{ needs.preflight.outputs.version }}.intoto.jsonl
          path: release-provenance

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          awk '
            /^## \['"$VERSION"'\]/ { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.txt

          if [ ! -s release-notes.txt ]; then
            echo "No release notes found for v$VERSION in CHANGELOG.md"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: v${{ needs.preflight.outputs.version }}
          body_path: release-notes.txt
          draft: false
          prerelease: ${{ contains(needs.preflight.outputs.version, '-') }}
          files: |
            all-artifacts/**/*.tar.xz
            all-artifacts/**/*.zip
            release-combined/SHA256SUMS
            all-signatures/**/*.sigstore.json
            release-provenance/*.intoto.jsonl
