[package]
name = "stellar-agent-toolsets-runtime"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Capability-to-tool matrix and enforcement layer for installed toolsets in the Stellar agent wallet."
publish = false

[dependencies]
stellar-agent-toolsets         = { workspace = true }
stellar-agent-toolsets-install = { workspace = true }
stellar-agent-core           = { workspace = true }
thiserror = { workspace = true }
tracing   = { workspace = true }
serde     = { workspace = true }

[dev-dependencies]
tempfile                   = { workspace = true }
stellar-agent-test-support = { workspace = true }
stellar-agent-toolsets       = { workspace = true, features = ["test-helpers"] }
stellar-agent-core         = { workspace = true }
serde_json                 = { workspace = true }
stellar-agent-toolsets-install = { workspace = true, features = ["test-helpers"] }

[features]
# Exposes test helpers for integration tests in sibling crates.
# Must NOT be enabled in production builds.
test-helpers = []

[lints]
workspace = true
